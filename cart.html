        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Your Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        /* Cart Container */
        .cart-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        /* Header */
        .cart-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 2rem;
        }

        .cart-header h1 {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .cart-header p {
            color: #94a3b8;
            margin-top: 0.5rem;
        }

        /* Main Content */
        .cart-content {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            padding: 2rem;
        }

        /* Cart Items Section */
        .cart-items-section {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }

        .cart-items-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .cart-items-header h2 {
            font-size: 1.25rem;
            color: #0f172a;
        }

        .item-count {
            background: #e2e8f0;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            color: #475569;
        }

        /* Cart Item Card */
        .cart-item {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1.25rem;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .cart-item:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateX(4px);
        }

        /* Product Image */
        .item-image {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            flex-shrink: 0;
        }

        /* Item Details */
        .item-details {
            flex: 1;
        }

        .item-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .item-category {
            display: inline-block;
            background: #e2e8f0;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            color: #475569;
            margin-bottom: 0.75rem;
        }

        .item-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #3b82f6;
            margin: 0.5rem 0;
        }

        /* Quantity Controls */
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .quantity-btn {
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 0.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #0f172a;
        }

        .quantity-btn:hover {
            background: #e2e8f0;
            transform: scale(0.95);
        }

        .quantity {
            font-size: 1rem;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        /* Item Total */
        .item-total {
            text-align: right;
            min-width: 100px;
        }

        .item-total-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }

        .item-total-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .remove-btn:hover {
            color: #dc2626;
            text-decoration: underline;
        }

        /* Order Summary */
        .order-summary {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .order-summary h3 {
            font-size: 1.25rem;
            color: #0f172a;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: #475569;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #e2e8f0;
            font-weight: 700;
            font-size: 1.25rem;
            color: #0f172a;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        /* Promo Code */
        .promo-code {
            margin-top: 1.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .promo-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 0.875rem;
        }

        .apply-btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-cart-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .empty-cart h3 {
            font-size: 1.5rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .continue-shopping {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .continue-shopping:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 968px) {
            body {
                padding: 1rem;
            }
            
            .cart-content {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
            
            .cart-item {
                flex-wrap: wrap;
            }
            
            .item-total {
                text-align: left;
                width: 100%;
                margin-top: 1rem;
            }
        }

        @media (max-width: 480px) {
            .cart-header h1 {
                font-size: 1.5rem;
            }
            
            .item-image {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="cart-container" id="cartApp">
        <div class="cart-header">
            <h1>
                🛒 Shopping Cart
            </h1>
            <p>Review and manage your items before checkout</p>
        </div>

        <div class="cart-content" id="cartContent">
            <!-- Cart items will be dynamically inserted here -->
        </div>
    </div>

    <script>
        // Sample cart data
        let cartItems = [
            {
                id: 1,
                name: "iPhone 15 Pro",
                category: "Phones",
                price: 999,
                quantity: 1,
                emoji: "📱",
                image: null
            },
            {
                id: 2,
                name: "AirPods Pro 2",
                category: "Accessories",
                price: 249,
                quantity: 2,
                emoji: "🎧",
                image: null
            },
            {
                id: 3,
                name: "PlayStation 5 Slim",
                category: "Gaming",
                price: 499,
                quantity: 1,
                emoji: "🎮",
                image: null
            },
            {
                id: 4,
                name: "MacBook Pro M3",
                category: "Laptops",
                price: 1999,
                quantity: 1,
                emoji: "💻",
                image: null
            }
        ];

        // Function to calculate cart totals
        function calculateTotals() {
            const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = subtotal > 0 ? (subtotal > 500 ? 0 : 19.99) : 0;
            const tax = subtotal * 0.10; // 10% tax
            const total = subtotal + shipping + tax;
            
            return { subtotal, shipping, tax, total };
        }

        // Function to update quantity
        function updateQuantity(itemId, change) {
            const item = cartItems.find(i => i.id === itemId);
            if (item) {
                const newQuantity = item.quantity + change;
                if (newQuantity > 0 && newQuantity <= 99) {
                    item.quantity = newQuantity;
                } else if (newQuantity === 0) {
                    removeItem(itemId);
                }
                renderCart();
            }
        }

        // Function to remove item
        function removeItem(itemId) {
            cartItems = cartItems.filter(item => item.id !== itemId);
            renderCart();
        }

        // Function to apply promo code
        let discount = 0;
        function applyPromoCode() {
            const promoInput = document.getElementById('promoInput');
            const promoCode = promoInput.value.trim().toUpperCase();
            
            if (promoCode === 'SAVE20') {
                discount = 20;
                alert('🎉 Promo code applied! You saved $20!');
            } else if (promoCode === 'WELCOME10') {
                discount = 10;
                alert('🎉 Welcome discount applied! You saved $10!');
            } else if (promoCode && promoCode !== '') {
                alert('❌ Invalid promo code. Try SAVE20 or WELCOME10');
                discount = 0;
            }
            renderCart();
            promoInput.value = '';
        }

        // Function to render cart
        function renderCart() {
            const cartContent = document.getElementById('cartContent');
            const { subtotal, shipping, tax, total } = calculateTotals();
            const finalTotal = total - discount;
            
            if (cartItems.length === 0) {
                // Empty cart view
                cartContent.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <h3>Your cart is empty</h3>
                        <p style="color: #64748b; margin-top: 0.5rem;">Looks like you haven't added any items yet</p>
                        <a href="#" class="continue-shopping">Continue Shopping →</a>
                    </div>
                `;
                return;
            }
            
            // Cart with items
            cartContent.innerHTML = `
                <div class="cart-items-section">
                    <div class="cart-items-header">
                        <h2>Cart Items</h2>
                        <span class="item-count">${cartItems.length} items</span>
                    </div>
                    <div id="cartItemsList">
                        ${cartItems.map(item => `
                            <div class="cart-item">
                                <div class="item-image">
                                    ${item.emoji}
                                </div>
                                <div class="item-details">
                                    <div class="item-title">${item.name}</div>
                                    <div class="item-category">${item.category}</div>
                                    <div class="item-price">$${item.price.toFixed(2)}</div>
                                    <div class="quantity-controls">
                                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                                        <span class="quantity">${item.quantity}</span>
                                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                                    </div>
                                </div>
                                <div class="item-total">
                                    <div class="item-total-label">Item Total</div>
                                    <div class="item-total-price">$${(item.price * item.quantity).toFixed(2)}</div>
                                    <button class="remove-btn" onclick="removeItem(${item.id})">
                                        🗑️ Remove
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>$${subtotal.toFixed(2)}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>${shipping === 0 ? 'Free' : `$${shipping.toFixed(2)}`}</span>
                    </div>
                    <div class="summary-row">
                        <span>Estimated Tax (10%)</span>
                        <span>$${tax.toFixed(2)}</span>
                    </div>
                    ${discount > 0 ? `
                        <div class="summary-row" style="color: #10b981;">
                            <span>Discount</span>
                            <span>-$${discount.toFixed(2)}</span>
                        </div>
                    ` : ''}
                    <div class="summary-total">
                        <span>Total</span>
                        <span>$${finalTotal.toFixed(2)}</span>
                    </div>
                    
                    <div class="promo-code">
                        <input type="text" id="promoInput" class="promo-input" placeholder="Promo code">
                        <button class="apply-btn" onclick="applyPromoCode()">Apply</button>
                    </div>
                    <small style="display: block; text-align: center; margin-top: 0.5rem; color: #64748b;">
                        Try: SAVE20 or WELCOME10
                    </small>
                    
                    <button class="checkout-btn" onclick="alert('Proceeding to checkout... Total: $${finalTotal.toFixed(2)}')">
                        Proceed to Checkout →
                    </button>
                </div>
            `;
        }
        
        // Initial render
        renderCart();
    </script>
</body>
</html>
        </div>
    </section>
</body>
