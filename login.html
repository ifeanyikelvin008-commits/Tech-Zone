  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to TECH ZONE - Your premier destination for electronics">
    <title>TECH ZONE | Login</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <a href="tech Zone.html" class="logo-link">
                    <h1 class="login-logo">TECH <span class="highlight">ZONE</span></h1>
                </a>
                <h2 class="welcome-title">Welcome Back! 👋</h2>
                <p class="welcome-text">Type your email and password to login</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <!-- Email Field -->
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           class="form-input" 
                           placeholder="Enter your email"
                           required>
                    <span class="input-error" id="emailError"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <div class="password-header">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" 
                               id="password" 
                               name="password" 
                               class="form-input password-input" 
                               placeholder="Enter your password"
                               required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                    <span class="input-error" id="passwordError"></span>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" class="checkbox">
                        <span class="checkbox-text">Remember me</span>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="login-btn">
                    <span>Continue</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span class="divider-text">or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn google-btn">
                    <img src="/thumbnails/7123025_logo_google_g_icon.png" 
                         alt="Google" 
                         class="google-icon">
                    <span>Login with Google</span>
                </button>
                
                <button class="social-btn facebook-btn">
                    <i class="fab fa-facebook-f"></i>
                    <span>Facebook</span>
                </button>
            </div>

            <!-- Sign Up Link -->
            <div class="signup-prompt">
                <p>Don't have an account? <a href="sign up.html" class="signup-link">Sign up now</a></p>
            </div>

            <!-- Back to Home -->
            <a href="tech Zone.html" class="back-home">
                <i class="fas fa-chevron-left"></i>
                Back to Home
            </a>
        </div>

        <!-- Decorative Elements -->
        <div class="login-decoration">
            <div class="decoration-circle circle-1"></div>
            <div class="decoration-circle circle-2"></div>
            <div class="decoration-circle circle-3"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="login.js"></script>
</body>
</html>
</html>
